<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2UI Agent</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=account_circle,add,arrow_back,arrow_drop_down,arrow_forward,attach_file,calendar_today,call,camera,check,check_circle,close,communication,content_copy,dark_mode,delete,download,draw,edit,error,event,favorite,favorite_off,folder,help,home,info,light_mode,location_on,lock,lock_open,mail,menu,mobile_layout,more_horiz,more_vert,notifications,notifications_off,payment,pen_size_1,person,phone,photo,print,progress_activity,rectangle,refresh,search,send,settings,share,shopping_cart,star,star_half,star_off,upload,visibility,visibility_off,warning"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --n-100: #ffffff; --n-99: #fcfcfc; --n-98: #f9f9f9; --n-95: #f1f1f1;
        --n-90: #e2e2e2; --n-80: #c6c6c6; --n-70: #ababab; --n-60: #919191;
        --n-50: #777777; --n-40: #5e5e5e; --n-35: #525252; --n-30: #474747;
        --n-25: #3b3b3b; --n-20: #303030; --n-15: #262626; --n-10: #1b1b1b;
        --n-5: #111111; --n-0: #000000;

        --p-100: #ffffff; --p-99: #fffbff; --p-98: #fcf8ff; --p-95: #f2efff;
        --p-90: #e1e0ff; --p-80: #c0c1ff; --p-70: #a0a3ff; --p-60: #8487ea;
        --p-50: #6a6dcd; --p-40: #5154b3; --p-35: #4447a6; --p-30: #383b99;
        --p-25: #2c2e8d; --p-20: #202182; --p-15: #131178; --p-10: #06006c;
        --p-5: #03004d; --p-0: #000000;

        --e-100: #ffffff; --e-95: #ffedea; --e-90: #ffdad6; --e-80: #ffb4ab;
        --e-40: #ba1a1a;

        --bb-grid-size: 4px;
        --bb-grid-size-2: calc(var(--bb-grid-size) * 2);
        --bb-grid-size-3: calc(var(--bb-grid-size) * 3);
        --bb-grid-size-4: calc(var(--bb-grid-size) * 4);
        --bb-grid-size-5: calc(var(--bb-grid-size) * 5);
        --bb-grid-size-6: calc(var(--bb-grid-size) * 6);
      }

      * { box-sizing: border-box; }

      html, body {
        --font-family: "Outfit", "Helvetica Neue", Helvetica, Arial, sans-serif;
        --font-family-flex: "Outfit", "Helvetica Neue", Helvetica, Arial, sans-serif;
        --font-family-mono: monospace;

        background: radial-gradient(at 0% 0%, light-dark(rgba(161, 196, 253, 0.3), rgba(6, 182, 212, 0.15)) 0px, transparent 50%),
          radial-gradient(at 100% 0%, light-dark(rgba(255, 226, 226, 0.3), rgba(59, 130, 246, 0.15)) 0px, transparent 50%),
          radial-gradient(at 100% 100%, light-dark(rgba(162, 210, 255, 0.3), rgba(20, 184, 166, 0.15)) 0px, transparent 50%),
          radial-gradient(at 0% 100%, light-dark(rgba(255, 200, 221, 0.3), rgba(99, 102, 241, 0.15)) 0px, transparent 50%),
          linear-gradient(120deg, light-dark(#f0f4f8, #0f172a) 0%, light-dark(#e2e8f0, #1e293b) 100%);
        font-family: var(--font-family);
        margin: 0; padding: 0;
        width: 100svw; height: 100svh; overflow: auto;

        --color-scheme: light;
        color-scheme: var(--color-scheme);
        &.light { --color-scheme: light; }
        &.dark { --color-scheme: dark; }
      }

      @media (prefers-color-scheme: dark) {
        html, body { --color-scheme: dark; }
      }
    </style>
  </head>

  <body>
    <a2ui-shell></a2ui-shell>
    <script type="module" src="./app.ts"></script>
  </body>
</html>
